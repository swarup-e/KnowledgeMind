name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

# Deploys a CLEAN snapshot of the current tree to a HF Space (Docker SDK).
# We push a single ORPHAN commit (no git history), so the repo's dev history --
# which contains old binary blobs (demo screenshots) that HF's pre-receive hook
# rejects -- never reaches the Space. The Space builds infra/Dockerfile, which
# compiles the React app and runs FastAPI on :7860.
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4   # shallow (tip only) is enough; we ship a snapshot

      - name: Build clean Space snapshot and push
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_SPACE_ID" ]; then
            echo "::error::HF_TOKEN and HF_SPACE_ID secrets are required."; exit 1
          fi
          # HF Space config files at repo root (Docker SDK reads the README header).
          cp infra/Dockerfile ./Dockerfile
          cp infra/.dockerignore ./.dockerignore
          cp infra/huggingface/README.md ./README.md
          # One orphan commit = current working tree only -> no history, no old
          # binary blobs. Force-push it as the Space's main.
          git config user.email "ci@github-actions"
          git config user.name "github-actions"
          git checkout --orphan hf-deploy
          git add -A
          git commit -m "deploy ${GITHUB_SHA::7}"
          git push --force "https://hf:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}.git" hf-deploy:main
