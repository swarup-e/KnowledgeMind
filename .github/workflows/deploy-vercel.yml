name: Deploy Frontend to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

# Builds and deploys the React front-end (frontend/) to Vercel. Set the
# VITE_API_BASE env var in the Vercel project to your HF Space URL so the
# front-end calls the right backend. The access key is entered by users, not
# baked into the build.
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN/ORG_ID/PROJECT_ID secrets are required."; exit 1
          fi
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN" --local-config infra/vercel.json
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
