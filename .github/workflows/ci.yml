name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm
      - name: Module smoke tests (offline)
        run: |
          for m in kg.schema kg.graph kg.queries connectors.base connectors.mock \
                   connectors.factory routing.router extraction.prompts extraction.ner \
                   extraction.timeparse extraction.commitment monitor.fsm \
                   proactive.briefing; do
            echo "== $m =="; python -m $m;
          done
      - name: Benchmark (routing/privacy contract)
        run: python benchmark.py --mode static
      - name: Conflict-detection demo
        run: python demo_conflicts.py

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build React app
        run: |
          cd frontend
          npm install
          npm run build
