<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KnowledgeMind</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><text y='20' font-size='20'>🧠</text></svg>" />
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">🧠</div>
        <div class="brand-name">Knowledge<span>Mind</span></div>
      </div>

      <nav class="nav">
        <button class="nav-item active" data-view="dashboard">
          <svg viewBox="0 0 24 24" class="icon"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
          <span>Dashboard</span>
        </button>
        <button class="nav-item" data-view="graph">
          <svg viewBox="0 0 24 24" class="icon"><circle cx="6" cy="6" r="2.4"/><circle cx="18" cy="7" r="2.4"/><circle cx="12" cy="18" r="2.4"/><path d="M8 7l8 0M7.5 8L11 16M16.5 9L13 16"/></svg>
          <span>Knowledge Graph</span>
        </button>
        <button class="nav-item" data-view="assistant">
          <svg viewBox="0 0 24 24" class="icon"><path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7a8.5 8.5 0 0 1-.9-3.8A8.38 8.38 0 0 1 12.5 3 8.38 8.38 0 0 1 21 11.5z"/></svg>
          <span>Assistant</span>
        </button>
      </nav>

      <div class="sidebar-foot">
        <div class="privacy-pill">
          <svg viewBox="0 0 24 24" class="icon"><path d="M12 2l8 4v6c0 5-3.4 8.5-8 10-4.6-1.5-8-5-8-10V6l8-4z"/><path d="M9 12l2 2 4-4"/></svg>
          <div><strong>On-device</strong><span>Personal data stays private</span></div>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <h1 id="page-title">Dashboard</h1>
        <div class="topbar-actions">
          <span id="mode-chip" class="chip chip-muted">…</span>
          <button id="scan-btn" class="btn btn-primary">
            <svg viewBox="0 0 24 24" class="icon"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 4v5h-5"/></svg>
            <span>Run scan</span>
          </button>
        </div>
      </header>

      <div class="content">
        <!-- Dashboard -->
        <section id="view-dashboard" class="view">
          <div class="privacy-banner">
            <svg viewBox="0 0 24 24" class="icon"><path d="M12 2l8 4v6c0 5-3.4 8.5-8 10-4.6-1.5-8-5-8-10V6l8-4z"/><path d="M9 12l2 2 4-4"/></svg>
            <div>
              <strong>All personal data stays on your device.</strong>
              KnowledgeMind watches your channels locally and only sends non-sensitive lookups to the cloud.
            </div>
          </div>

          <div id="kpis" class="kpi-row"></div>

          <h2 class="section-title">Conflict alerts</h2>
          <div id="conflicts" class="stack"></div>

          <h2 class="section-title">Upcoming commitments</h2>
          <div id="timeline" class="stack"></div>
        </section>

        <!-- Graph -->
        <section id="view-graph" class="view hidden">
          <div class="card">
            <div class="graph-legend">
              <span class="lg"><i class="dot dot-person"></i> Person</span>
              <span class="lg"><i class="dot dot-cal"></i> Calendar</span>
              <span class="lg"><i class="dot dot-chat"></i> Chat</span>
              <span class="lg"><i class="line line-conflict"></i> Conflict</span>
            </div>
            <div id="graph" class="graph-wrap"></div>
          </div>
        </section>

        <!-- Assistant -->
        <section id="view-assistant" class="view hidden">
          <div class="chat">
            <div id="chat-thread" class="chat-thread"></div>
            <form id="chat-form" class="composer">
              <select id="chat-level" class="select" title="Autonomy level">
                <option value="L1">L1 · quick</option>
                <option value="L2">L2 · plan</option>
                <option value="L3">L3 · agent</option>
              </select>
              <input id="chat-input" class="input" type="text" autocomplete="off"
                     placeholder="Ask anything — e.g. “Do I have any conflicts this week?”" />
              <button class="btn btn-primary" type="submit" aria-label="Send">
                <svg viewBox="0 0 24 24" class="icon"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
              </button>
            </form>
          </div>
        </section>
      </div>
    </main>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="/static/app.js"></script>
</body>
</html>
